name: CI Dockerビルド

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: ソースコードを確認する
        uses: actions/checkout@v4

      - name: Pythonをセットアップする
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Pythonパッケージをインストールする
        run: python -m pip install -r requirements.txt

      - name: テストを実行する
        run: python -m pytest

      - name: Docker Hubへログインする
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: DockerイメージをビルドしてPushする
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/flask-cicd-sample:latest

